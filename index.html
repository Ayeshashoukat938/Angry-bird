<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Naraz Hoon 💔</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(to right, #ffd6e8, #ffeef5);
        text-align: center;
    }

    .container {
        margin-top: 80px;
    }

    h1 {
        font-size: 40px;
        color: #ff4d88;
    }

    p {
        font-size: 22px;
        color: #555;
        margin: 20px;
    }

    .bubble {
        background: white;
        display: inline-block;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-top: 20px;
    }

    img {
        width: 200px;
        margin-top: 20px;
    }

    button {
        margin-top: 25px;
        padding: 12px 25px;
        border: none;
        background: #ff4d88;
        color: white;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #ff1a66;
    }
</style>
</head>

<body>

<div class="container">
    <h1>😤 Main Aap Se Naraz Hoon</h1>

    <div class="bubble">
        <p id="msg">Aap ne Mera msg Raat 9 bjy se ignore kiya howa h KACHIiiiiiiii BiLaL ... is liye m naraz hoon 💔</p>
    </div>

    <img src="cute.png" alt="cute cartoon">

    <br>

    <button onclick="changeText()">Manao Mujhe 🥺</button>
</div>

<script>
function changeText() {
    document.getElementById("msg").innerHTML = "Theek hai... ab thori si maan gayi hoon 😳💕";
}
</script>

</body>
</html>
